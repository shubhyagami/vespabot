server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: vespa-robot-fleet
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  websocket:
    max-text-message-size: 8192
    max-binary-message-size: 8192
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

logging:
  level:
    com.example.vespa: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.security: INFO

robot:
  simulation:
    enabled: true
    interval-ms: 3000
    trivandrum-center-lat: 8.5241
    trivandrum-center-lng: 76.9366
    bots:
      - id: BOT-01
        name: Atlas
      - id: BOT-02
        name: Gemini
      - id: BOT-03
        name: Nova
      - id: BOT-04
        name: Orion
      - id: BOT-05
        name: Phoenix
      - id: BOT-06
        name: Sentinel
  real-robot-id: BOT-06
